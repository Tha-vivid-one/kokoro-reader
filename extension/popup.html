<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <span class="header-brand">Kokoro Reader</span>
    <span class="header-version">v1.1</span>
  </div>

  <div id="serverStatus" class="server-status">
    <span id="statusDot" class="dot"></span>
    <span id="statusText">Checking...</span>
    <button id="serverToggle" class="server-btn" disabled>—</button>
  </div>

  <div class="form-content">
    <div class="field">
      <label for="serverUrl">Server URL</label>
      <input type="text" id="serverUrl" placeholder="http://localhost:8787">
    </div>

    <div class="field-row">
      <div class="field">
        <label for="voice">Voice</label>
        <select id="voice">
          <option value="af_heart">af_heart</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="speed">Speed</label>
      <div class="range-wrap">
        <input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0">
        <span class="range-value" id="speedVal">1.0x</span>
      </div>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Start server on login</span>
      <input type="checkbox" id="launchAtLogin">
    </div>

    <div id="status"></div>
    <button id="save">Save</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
