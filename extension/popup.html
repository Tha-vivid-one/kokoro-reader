<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">Kokoro Reader</div>

  <div id="serverStatus" class="server-status">
    <span id="statusDot" class="dot"></span>
    <span id="statusText">Checking...</span>
    <button id="serverToggle" class="server-btn" disabled>—</button>
  </div>

  <label for="serverUrl">Server URL</label>
  <input type="text" id="serverUrl" placeholder="http://localhost:8787">

  <label for="voice">Voice</label>
  <select id="voice">
    <option value="af_heart">af_heart</option>
  </select>

  <label for="speed">Speed: <span id="speedVal">1.0</span>x</label>
  <input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0">

  <div class="toggle-row">
    <label class="toggle-label" for="launchAtLogin">Start server on login</label>
    <input type="checkbox" id="launchAtLogin">
  </div>

  <div id="status"></div>
  <button id="save">Save</button>

  <script src="popup.js"></script>
</body>
</html>
